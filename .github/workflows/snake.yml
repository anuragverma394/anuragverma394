name: Generate Snake

on:
 schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: anuragverma394
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=FFAE00&color_dots=222222,444444,666666,888888,AAAAAA

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
